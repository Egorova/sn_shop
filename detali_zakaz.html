 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Магазин кроссовок</title>
</head>
<body class="b2">
    <div class="container_glavn">
        <!-- Фиксированный заголовок -->
        <header class="header_dopy">
            <a href="glav.html"><img src="img/Iconw.svg" alt="Назад"></a>
            <h1>№ 325556516</h1>
            <h1>      </h1>
        </header>

        <main class="cart-content">
            <h4>7 минут назад</h4>

            <div class="cart-item-container" ontouchstart="handleTouchStart(event)" ontouchend="handleTouchEnd(event, this)">
                <div class="cart-card main-card">
                    <div class="cart-img-box">
                        <img src="img/kros4.svg" alt="Nike">
                    </div>
                    <div class="cart-info">
                        <h3>Nike Air Max 200</h3>
                        <p class="item-price" data-unit-price="94.05">₽94.05</p>
                    </div>
                </div>
            </div>

            <div class="cart-item-container" ontouchstart="handleTouchStart(event)" ontouchend="handleTouchEnd(event, this)">
                <div class="cart-card main-card">
                    <div class="cart-img-box">
                        <img src="img/kros4.svg" alt="Nike">
                    </div>
                    <div class="cart-info">
                        <h3>Nike Air Max 200</h3>
                        <p class="item-price" data-unit-price="94.05">₽94.05</p>
                    </div>
                </div>
            </div>

            <div class="info-card">
                <h3>Контактная информация</h3>
                
                <!-- Email -->
                <div class="contact-item">
                    <div class="icon-box"><img src="img/mail_oform.svg"></div>
                    <div class="contact-details">
                        <span id="email-text" class="editable-data">example@mail.com</span>
                        <p>Email</p>
                    </div>
                </div>

                <!-- Телефон -->
                <div class="contact-item">
                    <div class="icon-box"><img src="img/nomer_oform.svg"></div>
                    <div class="contact-details">
                        <span id="phone-text" class="editable-data">+7 999 000-00-00</span>
                        <p>Телефон</p>
                    </div>
                </div>

                <h3>Адрес</h3>
                <div class="contact-item">
                    <div class="contact-details">
                        <a>1082 Аэропорт, Нигерия</a>
                    </div>
                </div>

                <!-- Карта-ссылка -->
                <a href="https://www.google.com/maps/search/?api=1&query=1082+Airport+Nigeria" target="_blank" class="map-link">
                    <div class="map-container">
                        <img src="img/Map.svg" class="map-bg">
                    </div>
                </a>

                <h3>Способ оплаты</h3>
                <div class="pay_select">
                    <div class="payment-info">
                        <img src="img/mir.svg" class="card-logo">
                        <div class="card-details">
                            <span>Добавить</span>
                            <p>**** ****</p>
                        </div>
                    </div>
                    <img src="img/ar_down.svg">
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
