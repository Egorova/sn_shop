<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Регистрация</title>
</head>
<body class="page-scroll">
    <a href="sign_in.html"><img src="img/Icon.svg" alt="Back" class="icon"></a>
    <h1 class="hi">Регистрация</h1>
    <p class="hiii sign_up-inline-1">Заполните свои данные или<br>продолжите через социальные седиа</p>
    <div class="wrap">
        <label>Ваше имя</label>
        <input type="text" id="name" class="input" placeholder="xxxxxxxx" class="input">
        <label>Email</label>
        <input type="email" id="email" class="input" placeholder="xyz@gmail.com" class="input">
        <label>Пароль</label>
        <input type="password" id="password" class="input" placeholder="********" class="input">
        <img src="img/Eye.svg" class="pass_icon">
    </div>
    <div class="sign_up-inline-2">
        <input type="checkbox" id="policyCheckbox" class="sign_up-inline-3">
        <label for="data" class="sign_up-inline-4">
            Даю согласие на обработку <br> 
            <span class="sign_up-inline-5">персональных данных</span>
        </label>
    </div>
    <button onclick="signUp()" class="btn_ent">Зарегистрироваться</button>
    <p class="sign_in">Есть аккаунт? <a href="sign_in.html" class="sign">Войти</a></p>
</body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="sign_up.js"></script>
</html>
