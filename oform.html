 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Магазин кроссовок</title>
</head>
<body class="b9">
    <div class="container_glavn">
        <header class="header_dopy">
            <a href="cart.html"><img src="img/Iconw.svg" alt="Назад"></a>
            <h1>Оформить заказ</h1>
            <div class="oform-inline-1"></div>
        </header>

        <main class="oform-content">
            <div class="info-card">
                <h3>Контактная информация</h3>
                
                <!-- Email -->
                <div class="contact-item">
                    <div class="icon-box"><img src="img/mail_oform.svg"></div>
                    <div class="contact-details">
                        <span id="email-text" class="editable-data">example@mail.com</span>
                        <p>Email</p>
                    </div>
                    <img src="img/edit.svg" class="edit-icon" onclick="editData('email-text')">
                </div>

                <!-- Телефон -->
                <div class="contact-item">
                    <div class="icon-box"><img src="img/nomer_oform.svg"></div>
                    <div class="contact-details">
                        <span id="phone-text" class="editable-data">+7 999 000-00-00</span>
                        <p>Телефон</p>
                    </div>
                    <img src="img/edit.svg" class="edit-icon" onclick="editData('phone-text')">
                </div>

                <h3>Адрес</h3>
                <div class="contact-item">
                    <div class="contact-details">
                        <a>1082 Аэропорт, Нигерия</a>
                    </div>
                    <img src="img/edit.svg" class="edit-icon" onclick="editData('phone-text')">
                </div>

                <!-- Карта-ссылка -->
                <a href="https://www.google.com/maps/search/?api=1&query=1082+Airport+Nigeria" target="_blank" class="map-link">
                    <div class="map-container">
                        <img src="img/Map.svg" class="map-bg">
                    </div>
                </a>

                <h3>Способ оплаты</h3>
                <div class="pay_select">
                    <div class="payment-info">
                        <img src="img/mir.svg" class="card-logo">
                        <div class="card-details">
                            <span>Добавить</span>
                            <p>**** ****</p>
                        </div>
                    </div>
                    <img src="img/ar_down.svg">
                </div>
            </div>
        </main>

        <!-- Чек -->
        <footer class="checkout-panel">
            <div class="price-row">
                <span>Сумма</span>
                <span class="price-bold">₽753.95</span>
            </div>
            <div class="price-row">
                <span>Доставка</span>
                <span class="price-bold delivery-price">₽60.20</span>
            </div>
            <div class="dashed-line"></div>
            <div class="price-row total">
                <span>Итого</span>
                <span class="price-blue">₽814.15</span>
            </div>
            <button onclick="openZaz()" class="btn_ent oform-inline-2">Подтвердить</button>
        </footer>
    </div>
    <div id="zazOverlay" class="overlay">
        <div class="popup-card">
            <img src="img/zakaz.svg" alt="Check Mail" class="popup-img">
            <button class="btn_bezotst" onclick="backbay()">Вернуться к покупкам</button>
        </div>
    </div>
    <script src="oform.js"></script>
</body>
</html>
